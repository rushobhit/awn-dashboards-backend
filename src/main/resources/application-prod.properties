# Production overrides
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Stricter CORS in production (override in CorsConfig if needed)
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://awn-dashboard.vercel.app}

# Minimal logging in prod
logging.level.root=WARN
logging.level.com.awn=INFO

# Disable Swagger in production (optional, comment out to keep)
# springdoc.api-docs.enabled=false
# springdoc.swagger-ui.enabled=false
