spring.application.name=AWN Dashboards

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-tiny-darkness-aoev5pei.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_flAc1Ha5mMOW}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP Connection Pool (tuned for Neon free tier) ─────────────────────
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=60000

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Disable open-in-view (prevents lazy loading in view rendering) ───────────
spring.jpa.open-in-view=false

# ─── Thymeleaf (disable template check since we're a pure REST API) ───────────
spring.thymeleaf.check-template-location=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

# ─── Caching (Simple in-memory, no extra dependency needed) ──────────────────
spring.cache.type=simple
